<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>食品価格下落チェッカー (e-Stat)</title>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #3498db;
            --accent: #e74c3c;
            --bg: #f5f6fa;
            --text: #2c3e50;
        }
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: var(--primary);
            margin-bottom: 20px;
        }
        .input-group {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        input[type="text"] {
            flex: 1;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 4px;
            font-size: 16px;
        }
        button {
            padding: 12px 24px;
            background-color: var(--secondary);
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #2980b9;
        }
        button:disabled {
            background-color: #bdc3c7;
            cursor: not-allowed;
        }
        #status {
            margin: 20px 0;
            padding: 15px;
            border-radius: 4px;
            display: none;
        }
        .status-info { background-color: #e8f4f8; color: #2980b9; }
        .status-error { background-color: #fcebeb; color: #c0392b; }
        .status-success { background-color: #e8f8f5; color: #27ae60; }
        
        .result-list {
            list-style: none;
            padding: 0;
        }
        .result-item {
            background: white;
            border-bottom: 1px solid #eee;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: transform 0.2s;
        }
        .result-item:hover {
            transform: translateX(5px);
            background-color: #fafafa;
        }
        .item-name {
            font-weight: bold;
            font-size: 1.1em;
        }
        .item-unit {
            font-size: 0.85em;
            color: #7f8c8d;
        }
        .price-drop {
            text-align: right;
        }
        .current-price {
            font-size: 1.2em;
            font-weight: bold;
            color: var(--secondary);
        }
        .diff {
            color: var(--accent);
            font-weight: bold;
            font-size: 0.9em;
        }
        .meta {
            font-size: 0.8em;
            color: #95a5a6;
            margin-top: 5px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>食品価格下落チェッカー 📉</h1>
    <p>e-Stat（政府統計）の小売物価統計調査APIを利用して、東京都区部で先月より値下がりした食品を探します。</p>
    
    <div class="input-group">
        <input type="password" id="apiKey" placeholder="e-Stat APIキーを入力してください" value="">
        <select id="areaSelect">
            <option value="13100">東京都区部</option>
            <!-- Generated by JS -->
        </select>
        <button id="fetchBtn">調査開始</button>
    </div>

    <div id="status"></div>
    <div id="results"></div>
    </div>

    <script>
    const API_BASE = 'https://api.e-stat.go.jp/rest/3.0/app/json';
    const STATS_CODE = '00200571'; 

    // Area codes for Prefectural Capitals & Major Cities
    const AREAS = [
        {code: '01100', name: '札幌市'}, {code: '02201', name: '青森市'}, {code: '03201', name: '盛岡市'},
        {code: '04100', name: '仙台市'}, {code: '05201', name: '秋田市'}, {code: '06201', name: '山形市'},
        {code: '07201', name: '福島市'}, {code: '08201', name: '水戸市'}, {code: '09201', name: '宇都宮市'},
        {code: '10201', name: '前橋市'}, {code: '11100', name: 'さいたま市'}, {code: '12100', name: '千葉市'},
        {code: '13100', name: '東京都区部'}, {code: '14100', name: '横浜市'}, {code: '15100', name: '新潟市'},
        {code: '16201', name: '富山市'}, {code: '17201', name: '金沢市'}, {code: '18201', name: '福井市'},
        {code: '19201', name: '甲府市'}, {code: '20201', name: '長野市'}, {code: '21201', name: '岐阜市'},
        {code: '22100', name: '静岡市'}, {code: '23100', name: '名古屋市'}, {code: '24201', name: '津市'},
        {code: '25201', name: '大津市'}, {code: '26100', name: '京都市'}, {code: '27100', name: '大阪市'},
        {code: '28100', name: '神戸市'}, {code: '29201', name: '奈良市'}, {code: '30201', name: '和歌山市'},
        {code: '31201', name: '鳥取市'}, {code: '32201', name: '松江市'}, {code: '33100', name: '岡山市'},
        {code: '34100', name: '広島市'}, {code: '35203', name: '山口市'}, {code: '36201', name: '徳島市'},
        {code: '37201', name: '高松市'}, {code: '38201', name: '松山市'}, {code: '39201', name: '高知市'},
        {code: '40130', name: '福岡市'}, {code: '41201', name: '佐賀市'}, {code: '42201', name: '長崎市'},
        {code: '43100', name: '熊本市'}, {code: '44201', name: '大分市'}, {code: '45201', name: '宮崎市'},
        {code: '46201', name: '鹿児島市'}, {code: '47201', name: '那覇市'}
    ];

    const statusEl = document.getElementById('status');
    const resultsEl = document.getElementById('results');
    const fetchBtn = document.getElementById('fetchBtn');
    const apiKeyInput = document.getElementById('apiKey');
    const areaSelect = document.getElementById('areaSelect');

    // Populate Area Select
    areaSelect.innerHTML = AREAS.map(a => `<option value="${a.code}" ${a.code === '13100' ? 'selected' : ''}>${a.name}</option>`).join('');

    function showStatus(msg, type = 'info') {
        statusEl.style.display = 'block';
        statusEl.className = `status-${type}`;
        statusEl.textContent = msg;
    }

    fetchBtn.addEventListener('click', async () => {
        const apiKey = apiKeyInput.value.trim();
        const areaCode = areaSelect.value;
        const areaName = areaSelect.options[areaSelect.selectedIndex].text;

        if (!apiKey) {
            showStatus('APIキーを入力してください。', 'error');
            return;
        }

        try {
            showStatus('統計表リストを取得中...');
            fetchBtn.disabled = true;
            resultsEl.innerHTML = '';

            // 1. Get Stats List
            // Remove searchWord to get a broader list, then filter client-side
            const listUrl = `${API_BASE}/getStatsList?appId=${apiKey}&statsCode=${STATS_CODE}&searchKind=1&limit=100`;
            const listResp = await fetch(listUrl);

            if (!listResp.ok) throw new Error(`API Error: ${listResp.status}`);
            const listData = await listResp.json();

            if (listData.GET_STATS_LIST.RESULT.STATUS !== 0) {
                const msg = listData.GET_STATS_LIST.RESULT.ERROR_MSG;
                throw new Error(`API Error: ${msg}`);
            }

            if (!listData.GET_STATS_LIST.DATALIST_INF || !listData.GET_STATS_LIST.DATALIST_INF.TABLE_INF) {
                 throw new Error('統計表が見つかりませんでした。');
            }

            let tables = listData.GET_STATS_LIST.DATALIST_INF.TABLE_INF;
            if (!Array.isArray(tables)) {
                tables = [tables];
            }

            // Helper to safely get title string
            const getTitle = (t) => {
                if (!t || !t.TITLE) return '';
                if (typeof t.TITLE === 'string') return t.TITLE;
                if (typeof t.TITLE === 'object' && t.TITLE['$']) return t.TITLE['$'];
                return JSON.stringify(t.TITLE); 
            };

            // Score tables to find the best one
            // We want: "Major Items" (主要品目), "City-based" (都市別), "Retail Price" (小売価格)
            // And definitely "Food" related if possible, but "Major Items" usually covers food.
            const scoredTables = tables.map(t => {
                let score = 0;
                const title = getTitle(t);

                if (title.includes('主要品目')) score += 10;
                if (title.includes('都市別')) score += 5;
                if (title.includes('小売価格')) score += 2;
                if (title.includes('食料')) score += 3; // Bonus
                if (t.SURVEY_DATE) score += 1; // Must have date

                return { table: t, score, title };
            });

            // Sort by Score desc, then Date desc
            scoredTables.sort((a, b) => {
                if (b.score !== a.score) return b.score - a.score;
                return (b.table.SURVEY_DATE || 0) - (a.table.SURVEY_DATE || 0);
            });

            const best = scoredTables[0];
            if (best.score < 5) {
                 // Try to list top 3 titles for debug
                 const candidates = scoredTables.slice(0, 3).map(x => x.title).join(', ');
                 throw new Error(`適切な統計表が見つかりませんでした。(候補: ${candidates})`);
            }

            const targetTable = best.table;
            const tableId = targetTable['@id'];
            const tableTitle = best.title;

            showStatus(`統計表「${tableTitle}」から最新データを取得中...`);            // 2. Get Meta Info to find the latest time points
            const metaUrl = `${API_BASE}/getStatsData?appId=${apiKey}&statsDataId=${tableId}&limit=1`;
            const metaResp = await fetch(metaUrl);
            const metaJson = await metaResp.json();

            if (metaJson.GET_STATS_DATA.RESULT.STATUS !== 0) {
                throw new Error('メタデータの取得に失敗しました。');
            }

            const classObj = metaJson.GET_STATS_DATA.STATISTICAL_DATA.CLASS_INF.CLASS_OBJ;
            // Find time class
            let timeObj = classObj.find(c => c['@id'] === 'time');
            if (!timeObj) {
                 timeObj = classObj.find(c => Array.isArray(c.CLASS) && c.CLASS[0] && c.CLASS[0]['@code'].length >= 6 && !isNaN(c.CLASS[0]['@code']));
            }

            if (!timeObj || !timeObj.CLASS) {
                 throw new Error('時間軸データが見つかりませんでした。');
            }

            const timeList = Array.isArray(timeObj.CLASS) ? timeObj.CLASS : [timeObj.CLASS];
            // Sort by code descending
            const sortedTimes = timeList.sort((a, b) => b['@code'].localeCompare(a['@code']));

            if (sortedTimes.length < 2) {
                throw new Error('比較可能な過去データ（2ヶ月分）がありません。');
            }

            const latestTime = sortedTimes[0];
            const prevTime = sortedTimes[1];

            showStatus(`データ取得中... (${prevTime['@name']} → ${latestTime['@name']} @ ${areaName})`);

            // 3. Fetch Actual Data
            const dataUrl = `${API_BASE}/getStatsData?appId=${apiKey}&statsDataId=${tableId}&cdArea=${areaCode}&cdTime=${latestTime['@code']},${prevTime['@code']}&limit=100000`;
            const dataResp = await fetch(dataUrl);
            const dataJson = await dataResp.json();

            if (dataJson.GET_STATS_DATA.RESULT.STATUS !== 0) {
                 throw new Error('データの取得に失敗しました。');
            }

            const statsData = dataJson.GET_STATS_DATA.STATISTICAL_DATA;
            if (!statsData.DATA_INF) {
                throw new Error(`データが見つかりませんでした。（${areaName}のデータがない可能性があります）`);
            }

            const values = Array.isArray(statsData.DATA_INF.VALUE) ? statsData.DATA_INF.VALUE : [statsData.DATA_INF.VALUE];

            // Identify Item Class dynamically
            const classObjList = statsData.CLASS_INF.CLASS_OBJ;
            let itemClassObj = classObjList.find(c => c['@name'] && c['@name'].includes('品目'));

            // Fallback: Find the class with the most items (excluding Time and Area)
            if (!itemClassObj) {
                let maxLen = 0;
                classObjList.forEach(c => {
                    if (c['@id'] === 'time' || c['@id'] === 'area' || c['@name'] === '時間軸' || c['@name'] === '地域') return;
                    const len = Array.isArray(c.CLASS) ? c.CLASS.length : 1;
                    if (len > maxLen) {
                        maxLen = len;
                        itemClassObj = c;
                    }
                });
            }

            if (!itemClassObj) {
                // Last resort: cat01
                itemClassObj = classObjList.find(c => c['@id'] === 'cat01');
            }

            if (!itemClassObj) {
                throw new Error('品目情報（Item Class）が特定できませんでした。');
            }

            const itemClassId = itemClassObj['@id']; // e.g., "cat01"

            const itemMap = new Map();
            if (itemClassObj.CLASS) {
                const arr = Array.isArray(itemClassObj.CLASS) ? itemClassObj.CLASS : [itemClassObj.CLASS];
                arr.forEach(c => itemMap.set(c['@code'], { name: c['@name'], unit: c['@unit'] }));
            }

            // Process Data
            const currentPrices = new Map();
            const prevPrices = new Map();
            let processCount = 0;

            // Food Filter Logic
            const isFoodItem = (name) => {
                // Exclusion List (Non-Food)
                const excludes = [
                    '家賃', '電気', 'ガス', '水道', '工事', '修理', '運賃', '料金', '料', '費', // Utilities/Services
                    '被服', 'シャツ', '下着', '靴', '服', '着', '帯', '傘', // Clothing
                    '洗剤', '殺虫', 'ペーパー', 'おむつ', '石けん', 'シャンプー', '化粧', // Daily goods
                    '診療', '薬', 'コンタクト', '眼鏡', '保健', // Medical
                    '授業', '月謝', '教科書', '講習', // Education
                    '自動車', 'ガソリン', '灯油', 'タイヤ', // Transport/Fuel
                    'テレビ', 'パソコン', 'カメラ', '机', '椅子', '時計', 'エアコン', '冷蔵庫', '洗濯機', // Durables
                    'たばこ', '新聞', '宿泊', '理髪', 'パーマ', 'カット', '写真', '放送' // Misc/Services
                ];

                // Inclusion List (Food) - If it hits exclusion, it's out. If not, check inclusion.
                // Note: Some food items might contain "料" (e.g. 飲料). We handle specific overrides or order.
                // Actually, "飲料" contains "料". So we must be careful.
                // Strategy: Check POSITIVE matches first? No, "トイレットペーパー" might match "ペーパー".

                // Refined Strategy:
                // 1. Check strict exclusions (things that are definitely not food)
                if (name.includes('家賃') || name.includes('電気代') || name.includes('ガス代') || 
                    name.includes('水道') || name.includes('交通') || name.includes('通信') || 
                    name.includes('授業') || name.includes('月謝') || name.includes('観覧') ||
                    name.includes('宿泊') || name.includes('理髪') || name.includes('パーマ') ||
                    (name.includes('機器') && !name.includes('調理')) || // Exclude devices
                    name.includes('修理') || name.includes('工事')) return false;

                // 2. Check "Explicit Non-Food Goods"
                const nonFoodGoods = [
                    '洗剤', 'ペーパー', 'ラップ', 'おむつ', '生理用品', '化粧', 'シャンプー', '石けん', 
                    'タオル', '殺虫', '防虫', '電池', '電球', '花', '植木', 'えさ', 'たばこ',
                    'シャツ', 'ソックス', '下着', 'セーター', '背広', 'スカート', 'ズボン', '靴',
                    'テレビ', 'パソコン', 'レコーダー', 'カメラ', 'ピアノ', '机', '椅子', '時計',
                    '冷蔵庫', '洗濯機', '掃除機', 'エアコン', 'ストーブ', 'こたつ', 'ガソリン', '灯油'
                ];
                if (nonFoodGoods.some(k => name.includes(k))) return false;

                // 3. Check "Food keywords"
                // If it wasn't excluded, is it food?
                // Many food items are simple: "食パン", "まぐろ".
                // But some are "外食" (Eating out) - user might want this or not. Usually "Food" includes eating out in CPI.
                // Let's assume if it passed the exclusions, and it's in the "Retail Price Survey", it's likely food or daily necessity.
                // To be safe, let's require a food keyword OR assume everything else is food?
                // No, "ノート" (Notebook) exists.

                const foodKeywords = [
                    '米', 'パン', '麺', '粉', '麦', '餅', 'シリアル',
                    '魚', '貝', '海藻', '刺身', 'すし', '寿司', 'カツオ', 'サケ', 'イカ', 'エビ', 'カニ',
                    '肉', '牛', '豚', '鶏', 'ハム', 'ソーセージ', 'ベーコン',
                    '乳', '牛', 'チーズ', 'バター', 'マーガリン', 'ヨーグルト', '卵',
                    '野菜', '菜', '芋', '豆', 'きのこ', '筍', 'コーン',
                    '果物', '実', 'りんご', 'みかん', 'バナナ', 'いちご', 'ぶどう', '梨', '桃',
                    '油', '調味', '塩', '砂糖', '醤油', '味噌', '酢', 'ソース', 'ケチャップ', 'マヨネーズ', 'ドレッシング', 'ジャム', 'カレー', 'スープ', '素',
                    '菓子', 'ケーキ', 'プリン', 'ゼリー', 'アイス', 'チョコ', 'あめ', 'せんべい', 'スナック',
                    '飲料', '茶', 'コーヒー', 'ジュース', '水', '酒', 'ビール', 'ワイン', '焼酎',
                    '弁当', 'おにぎり', 'サンドイッチ', 'ハンバーガー', '牛丼', 'ラーメン', 'ランチ', '定食', '食事'
                ];

                if (foodKeywords.some(k => name.includes(k))) return true;

                // 4. Special Allowlist for items that might be missed
                const specialAllow = ['豆腐', '納豆', 'こんにゃく', '梅干し', 'かつお節', '餃子', 'シューマイ', 'コロッケ', '天ぷら', 'うなぎ蒲焼'];
                if (specialAllow.some(k => name.includes(k))) return true;

                return false;
            };

            values.forEach(v => {
                const itemCode = v[`@${itemClassId}`]; // Use dynamic ID
                const timeCode = v['@time'] || v['@catTime']; // Try common time IDs
                const price = parseFloat(v['$']);

                if (isNaN(price)) return;

                if (!itemMap.has(itemCode)) return;
                const info = itemMap.get(itemCode);

                // Filter Non-Food
                if (!isFoodItem(info.name)) return;

                processCount++;

                // Match time code
                if (timeCode === latestTime['@code']) {
                    currentPrices.set(itemCode, { ...info, price });
                } else if (timeCode === prevTime['@code']) {
                    prevPrices.set(itemCode, { ...info, price });
                }
            });
            // Compare
            showStatus(`データを分析中... (取得レコード数: ${values.length}, 有効データ: ${processCount})`);
            const comparison = comparePricesDetailed(currentPrices, prevPrices);

            renderResultsDetailed(comparison, latestTime['@name'], prevTime['@name'], areaName, tableTitle);

            if (comparison.dropped.length > 0) {
                showStatus(`分析完了: ${comparison.dropped.length}件の値下がり食品が見つかりました。`, 'success');
            } else {
                showStatus(`分析完了: 値下がりした品目はありませんでした。`, 'info');
            }

            } catch (err) {
            console.error(err);
            showStatus(`エラーが発生しました: ${err.message}`, 'error');
            if (err.message.includes('Failed to fetch')) {
                showStatus('CORSエラーの可能性があります。ブラウザのセキュリティ設定を確認するか、ローカルサーバー経由で実行してください。', 'error');
            }
            } finally {
            fetchBtn.disabled = false;
            }
            });

            function comparePricesDetailed(currentMap, prevMap) {
            const dropped = [];
            const rose = [];
            const same = [];

            currentMap.forEach((currItem, code) => {
            if (prevMap.has(code)) {
                const prevItem = prevMap.get(code);
                const diff = currItem.price - prevItem.price;
                const percent = (diff / prevItem.price) * 100;

                const itemData = {
                    name: currItem.name,
                    unit: currItem.unit,
                    currentPrice: currItem.price,
                    prevPrice: prevItem.price,
                    diff: diff,
                    percent: percent
                };

                if (diff < 0) {
                    dropped.push(itemData);
                } else if (diff > 0) {
                    rose.push(itemData);
                } else {
                    same.push(itemData);
                }
            }
            });

            dropped.sort((a, b) => a.percent - b.percent); // Largest drop % first
            rose.sort((a, b) => b.percent - a.percent);     // Largest rise % first

            return { dropped, rose, same, total: dropped.length + rose.length + same.length };
            }

            function renderResultsDetailed(comparison, currDateName, prevDateName, areaName, tableTitle) {
            const { dropped, rose, same, total } = comparison;

            let html = `
            <div style="background:#f8f9fa; padding:15px; border-radius:5px; margin-bottom:20px; border:1px solid #e9ecef;">
                <h3 style="margin-top:0; font-size:1.1em; color:#2c3e50;">📊 市場分析レポート</h3>
                <p style="margin:5px 0; font-size:0.9em; color:#666;">
                    <strong>データ出典:</strong> ${tableTitle}<br>
                    <strong>比較期間:</strong> ${prevDateName} → ${currDateName}<br>
                    <strong>調査地域:</strong> ${areaName}<br>
                    <strong>総比較品目数:</strong> ${total} 品目
                </p>
                <div style="display:flex; gap:15px; margin-top:10px; font-size:0.9em;">
                    <span style="color:#27ae60; font-weight:bold;">↘ 値下がり: ${dropped.length}</span>
                    <span style="color:#e74c3c; font-weight:bold;">↗ 値上がり: ${rose.length}</span>
                    <span style="color:#7f8c8d; font-weight:bold;">→ 変わらず: ${same.length}</span>
                </div>
            </div>
            `;
            if (dropped.length > 0) {
            html += `<h4 style="color:#27ae60;">値下がりした食品・品目</h4>`;
            html += `<ul class="result-list">`;
            html += dropped.map(item => `
                <li class="result-item">
                    <div>
                        <div class="item-name">${item.name}</div>
                        <div class="item-unit">${item.unit || ''}</div>
                    </div>
                    <div class="price-drop">
                        <div class="current-price">¥${item.currentPrice.toLocaleString()}</div>
                        <div class="diff">↘ ¥${Math.abs(item.diff).toLocaleString()} (${Math.abs(item.percent).toFixed(1)}%)</div>
                    </div>
                </li>
            `).join('');
            html += `</ul>`;
            } else {
            html += `
                <div style="text-align:center; padding:30px; background:#fff; border:1px dashed #ccc; color:#7f8c8d;">
                    <p>この期間に値下がりした主要品目はありませんでした。</p>
                </div>
            `;
            }

            // Optional: Show top price increases if no drops found, to prove data exists
            if (dropped.length === 0 && rose.length > 0) {
            html += `<h4 style="color:#e74c3c; margin-top:30px;">参考: 値上がりした品目 (上位5件)</h4>`;
            html += `<ul class="result-list">`;
            html += rose.slice(0, 5).map(item => `
                <li class="result-item" style="border-left: 3px solid #e74c3c;">
                    <div>
                        <div class="item-name">${item.name}</div>
                        <div class="item-unit">${item.unit || ''}</div>
                    </div>
                    <div class="price-drop">
                        <div class="current-price" style="color:#e74c3c;">¥${item.currentPrice.toLocaleString()}</div>
                        <div class="diff" style="color:#e74c3c;">↗ ¥${Math.abs(item.diff).toLocaleString()} (+${Math.abs(item.percent).toFixed(1)}%)</div>
                    </div>
                </li>
            `).join('');
            html += `</ul>`;
            }

            resultsEl.innerHTML = html;
            }    /* Previous code removed to avoid duplication/confusion, keeping only the above script block and body closing */
    </script>

    </body>
    </html>
